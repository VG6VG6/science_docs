<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Проверка научных публикаций</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body data-theme="dark" class="theme-dark">
    <header class="appHeader">
        <div class="brandBlock">
            <div class="logoSlot" aria-label="Место для логотипа">ЛОГО</div>
            <div class="brandText">
                <h1>Проверка научных публикаций</h1>
                <p>Верификация журналов по данным Scopus и SJR</p>
            </div>
        </div>

        <button type="button" class="themeToggle iconBtn" id="themeToggle" aria-label="Переключить тему">
            <!-- Moon Icon -->
            <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="theme-icon dark-icon"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
            <!-- Sun Icon -->
            <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="theme-icon light-icon" style="display: none;"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
        </button>
    </header>

    <main class="appMain">
        <section class="searchCard">
            <form action="" class="inputForm" id="inputForm">
                <div class="formScientific formMode">
                    <label>Режим поиска</label>
                    <div class="customSelect" id="customSearchMode">
                        <div class="selectTrigger" id="searchModeTrigger" tabindex="0">
                            <span id="searchModeLabel">По названию</span>
                            <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="selectIcon"><polyline points="6 9 12 15 18 9"></polyline></svg>
                        </div>
                        <div class="selectOptions" id="searchModeOptions">
                            <div class="selectOption selected" data-value="title">По названию</div>
                            <div class="selectOption" data-value="author">По автору</div>
                        </div>
                    </div>
                    <input type="hidden" id="searchMode" name="searchMode" value="title">
                </div>

                <div class="formScientific formWide">
                    <label for="queryText" id="queryLabel">Введите название</label>
                    <input type="text" id="queryText" name="queryText" required>
                </div>

                <div class="formScientific formSmall authorOnly hidden" id="refreshWrap">
                    <label>Обновить данные</label>
                    <label class="customCheckbox" for="refresh">
                        <input type="checkbox" id="refresh" name="refresh" class="sr-only">
                        <div class="checkbox-box">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                        </div>
                    </label>
                </div>

                <button type="submit" class="submitBtn iconBtn" id="submitBtn" aria-label="Найти">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </button>
            </form>

            <div class="status" id="status"></div>

            <div class="exportRow">
                <button type="button" class="submitBtn" id="exportBtn" aria-label="Экспорт в CSV" style="display: none;">
                    Скачать CSV
                </button>
            </div>
        </section>

        <section class="tableCard">
            <div class="tableWrap">
                <table>
                    <thead>
                        <tr>
                            <th>Запрос</th>
                            <th>Авторы</th>
                            <th>Название в Scopus</th>
                            <th>ISSN / eISSN</th>
                            <th>Год</th>
                            <th>Журнал</th>
                            <th>Квартиль</th>
                            <th>SJR</th>
                            <th>Индекс Хирша</th>
                            <th>Страна</th>
                            <th>Белый список</th>
                            <th>Категория ВАК</th>
                        </tr>
                    </thead>
                    <tbody id="resultBody">
                        <tr>
                            <td colspan="12" class="muted">Пока нет данных</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="/static/script.js"></script>
</body>

</html>
